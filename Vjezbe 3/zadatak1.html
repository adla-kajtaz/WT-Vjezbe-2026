<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Vinyl Specialists</title>
    <style>
      body {
        background-color: #f4f4f4;
        font-family: "Courier New", Courier, monospace;
      }
      #page {
        width: 800px;
        margin: 50px auto;
        background-color: white;
        border: 4px double #333;
        padding: 40px;
        text-align: center;
      }
      #header-logo {
        text-transform: uppercase;
        letter-spacing: 5px;
        border-bottom: 2px solid #333;
        padding-bottom: 10px;
        margin-bottom: 10px;
      }
      ul#navigation {
        list-style-type: none;
        padding: 0;
        margin: 0;
        border-bottom: 2px solid #333;
        padding-bottom: 15px;
      }
      ul#navigation li {
        display: inline;
        margin: 0 15px;
        text-transform: uppercase;
        font-size: 14px;
      }
      a {
        text-decoration: none;
        color: black;
      }
      .image-container {
        margin: 30px 0;
      }
      .image-container img {
        width: 250px;
        height: 200px;
        object-fit: cover;
        margin: 0 5px;
      }
      #footer {
        font-size: 16px;
        line-height: 1.6;
        color: #444;
        max-width: 600px;
        margin: 0 auto;
      }
      #on {
        color: brown;
      }
    </style>
  </head>
  <body>
    <div id="page">
      <div id="header-logo">
        <h1>The Vinyl Specialists</h1>
      </div>

      <ul id="navigation">
        <li><a href="#" id="on">Home</a></li>
        <li><a href="#">For Sale</a></li>
        <li><a href="#">Repairs</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>

      <div class="image-container">
        <img
          src="https://images.unsplash.com/photo-1603048588665-791ca8aea617?w=400"
          alt="Vinyl 1"
        />
        <img
          src="https://images.stockcake.com/public/8/c/b/8cbe37d3-2a25-45ec-92a3-03c1118e7d13_large/vintage-vinyl-player-stockcake.jpg"
          alt="Vinyl 2"
        />
        <img
          src="https://images.unsplash.com/photo-1461360370896-922624d12aa1?w=400"
          alt="Vinyl 3"
        />
      </div>

      <p id="footer">
        We specialize in the sale and restoration of vintage vinyl records.
      </p>
    </div>
  </body>
</html>
